{% set name = "PyFunctional" %}
{% set version = "1.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: e184f3d7167e5822b227c95292c3557cf59edf258b1f06a08c8e82991de98769

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry
    - setuptools
  run:
    - python >={{ python_min }}
    - dill >=0.2.5
    - tabulate <=1.0.0

test:
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check
  imports:
    - functional

about:
  home: https://github.com/EntilZha/PyFunctional
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Python library for creating data pipelines with chain functional programming
  description: |
    Python library for creating data pipelines with chain functional programming

extra:
  recipe-maintainers:
    - timkpaine
